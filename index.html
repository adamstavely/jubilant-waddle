<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARBOR AI Assist Panel — Demo</title>
  <link rel="stylesheet" href="/src/styles/tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a18;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 24px;
      padding: 24px;
    }
    .demo-panel {
      width: 420px;
      height: 680px;
      display: flex;
      flex-direction: column;
    }
    .demo-label {
      color: #5c5c7a;
      font-size: 11px;
      font-family: monospace;
      margin-bottom: 8px;
      letter-spacing: 0.06em;
    }
    arbor-ai-assist {
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="demo-panel">
    <div class="demo-label">ARBOR AI ASSIST PANEL v2.1</div>
    <arbor-ai-assist
      id="panel"
      document-id="demo-doc-001"
      document-name="Sample Contract.pdf"
    ></arbor-ai-assist>
  </div>

  <script type="module" src="/src/index.ts"></script>
  <script type="module">
    import { DEFAULT_MODELS } from '/src/models/chat.ts';
    import { DEFAULT_SETTINGS } from '/src/models/chat.ts';

    const panel = document.getElementById('panel');

    // Simulate host providing data
    panel.availableModels = [
      { id: 'arbor-4-mini', label: 'ARBOR-4-mini', tier: 'fast', tierLabel: '4m', contextWindowTokens: 32000, available: true },
      { id: 'arbor-4.5-mini', label: 'ARBOR-4.5-mini', tier: 'fast', tierLabel: '4.5m', contextWindowTokens: 32000, available: false },
      { id: 'arbor-4o', label: 'ARBOR-4o', tier: 'balanced', tierLabel: '4o', contextWindowTokens: 128000, available: true, default: true },
      { id: 'arbor-4.5', label: 'ARBOR-4.5', tier: 'balanced', tierLabel: '4.5', contextWindowTokens: 128000, available: true },
      { id: 'arbor-o3', label: 'ARBOR-o3', tier: 'reasoning', tierLabel: 'o3', contextWindowTokens: 200000, available: true },
      { id: 'arbor-o4', label: 'ARBOR-o4', tier: 'reasoning', tierLabel: 'o4', contextWindowTokens: 200000, available: false },
      { id: 'arbor-4.5-turbo', label: 'ARBOR-4.5-turbo', tier: 'extended', tierLabel: 'turbo', contextWindowTokens: 1000000, available: true },
    ];

    panel.storedPrompts = [
      { id: '1', name: 'Privilege Analysis', description: 'Evaluate privilege claims', content: 'Analyze this document for attorney-client privilege.', type: 'message', scope: 'personal', tags: ['legal'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '2', name: 'Obligation Extraction', description: 'List all obligations', content: 'List all contractual obligations by party and deadline.', type: 'message', scope: 'personal', tags: ['contract'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '3', name: 'Risk Summary', content: 'Summarize key legal risks.', type: 'both', scope: 'team', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
    ];

    // Simulate token usage updates
    let used = 12340;
    setInterval(() => {
      panel.tokenUsage = {
        documentTokens: 8200,
        historyTokens: used - 8200 - 640,
        systemTokens: 640,
        totalUsed: used,
        contextLimit: 128000,
        remaining: 128000 - used,
        lastUpdated: new Date().toISOString(),
      };
      used = Math.min(used + 150, 125000);
    }, 2000);

    // Log events
    ['model-changed', 'settings-changed', 'context-level-changed', 'history-persistence-changed', 'chat-message-sent'].forEach(ev => {
      panel.addEventListener(ev, e => console.log(`[arbor] ${ev}`, e.detail));
    });
  </script>
</body>
</html>
