<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARBOR AI Assist Panel — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dist/tokens/tokens.css?v=3" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ai-color-bg-base);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ai-spacing-xl);
    }
    .demo-content {
      max-width: 600px;
      color: var(--ai-color-text-primary);
      font-size: var(--ai-font-size-base);
      line-height: 1.6;
    }
    .demo-content h1 {
      font-size: var(--ai-font-size-xl);
      margin-bottom: var(--ai-spacing-md);
      color: var(--ai-color-accent-default);
    }
    .trigger-btn {
      margin-top: var(--ai-spacing-lg);
      padding: var(--ai-spacing-sm) var(--ai-spacing-lg);
      background: var(--ai-color-accent-default);
      color: var(--ai-color-accent-on-accent);
      border: none;
      border-radius: var(--ai-radius-md);
      font-size: var(--ai-font-size-base);
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--ai-duration-fast);
    }
    .trigger-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="demo-content">
    <h1>ARBOR Document Review</h1>
    <p>Click the button below to open the AI Assist Panel. The panel slides in from the right with a backdrop. Press Escape or click the backdrop to close.</p>
    <button class="trigger-btn" id="trigger">Open AI Assist Panel</button>
  </div>

  <arbor-ai-assist
    id="panel"
    document-id="demo-doc-001"
    document-name="Sample Contract.pdf"
  ></arbor-ai-assist>

  <script type="module" src="/src/index.ts"></script>
  <script type="module">
    const panel = document.getElementById('panel');
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('click', () => {
      panel.open = true;
    });

    panel.addEventListener('open-change', (e) => {
      panel.open = e.detail.open;
    });

    async function initPanel() {
      await customElements.whenDefined('arbor-ai-assist');
      // Simulate host providing data
      panel.availableModels = [
      { id: 'arbor-4-mini', label: 'ARBOR-4-mini', tier: 'fast', tierLabel: '4m', contextWindowTokens: 32000, available: true },
      { id: 'arbor-4.5-mini', label: 'ARBOR-4.5-mini', tier: 'fast', tierLabel: '4.5m', contextWindowTokens: 32000, available: false },
      { id: 'arbor-4o', label: 'ARBOR-4o', tier: 'balanced', tierLabel: '4o', contextWindowTokens: 128000, available: true, default: true },
      { id: 'arbor-4.5', label: 'ARBOR-4.5', tier: 'balanced', tierLabel: '4.5', contextWindowTokens: 128000, available: true },
      { id: 'arbor-o3', label: 'ARBOR-o3', tier: 'reasoning', tierLabel: 'o3', contextWindowTokens: 200000, available: true },
      { id: 'arbor-o4', label: 'ARBOR-o4', tier: 'reasoning', tierLabel: 'o4', contextWindowTokens: 200000, available: false },
      { id: 'arbor-4.5-turbo', label: 'ARBOR-4.5-turbo', tier: 'extended', tierLabel: 'turbo', contextWindowTokens: 1000000, available: true },
    ];

    panel.storedPrompts = [
      { id: '1', name: 'Privilege Analysis', description: 'Evaluate privilege claims', content: 'Analyze this document for attorney-client privilege.', type: 'message', scope: 'personal', tags: ['legal'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '2', name: 'Obligation Extraction', description: 'List all obligations', content: 'List all contractual obligations by party and deadline.', type: 'message', scope: 'personal', tags: ['contract'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '3', name: 'Risk Summary', content: 'Summarize key legal risks.', type: 'both', scope: 'team', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
    ];

    // Fake long chat for timeline view testing (24 user messages = 24 timeline dots)
    const userPrompts = [
      'What are the indemnification clauses?',
      'Summarize the key obligations in section 5.',
      'Who are the parties to this agreement?',
      'What is the term and termination notice period?',
      'Are there any exclusivity provisions?',
      'What happens if there is a breach of confidentiality?',
      'Explain the limitation of liability cap.',
      'What governing law applies to this contract?',
      'Are there any force majeure provisions?',
      'What are the payment terms and schedule?',
      'Is there an audit right for the customer?',
      'What IP ownership is assigned vs licensed?',
      'Describe the warranty and support obligations.',
      'What are the renewal and pricing terms?',
      'Is there a non-compete or non-solicit?',
      'How is dispute resolution handled?',
      'What data protection obligations exist?',
      'Are there any sublicense or assignment restrictions?',
      'What is the scope of the license grant?',
      'Describe the acceptance and testing process.',
      'What insurance requirements are specified?',
      'Are there change order or amendment procedures?',
      'What happens to data upon termination?',
      'Summarize the entire agreement in bullet points.',
    ];
    const assistantReplies = [
      'Section 12 contains the indemnification clause. The vendor indemnifies for IP claims; the customer for misuse.',
      'Section 5 outlines delivery milestones, acceptance criteria, and the 30-day cure period for defects.',
      'The parties are Acme Corp (Customer) and VendorCo LLC (Vendor), both duly organized entities.',
      'The term is 3 years from Effective Date, with 90 days written notice required for non-renewal.',
      'Yes, Section 8 grants the customer a 2-year exclusivity in the North American market.',
      'Breach triggers 30-day cure, then termination and return of confidential materials within 14 days.',
      'Liability is capped at the greater of fees paid in the 12 months prior or $500,000.',
      'The agreement is governed by the laws of the State of Delaware, excluding conflicts principles.',
      'Yes, Section 15 covers force majeure with a 30-day notice and extension of performance deadlines.',
      'Payment is net 30 from invoice; annual fees due in advance; late fees at 1.5% per month.',
      'The customer may audit usage once per year with 30 days notice; vendor bears cost if overage exceeds 5%.',
      'Vendor retains all pre-existing IP; customer receives a license. Custom work is work-for-hire to customer.',
      'Vendor provides 99.5% uptime SLA, 24/7 support, and 4-hour response for critical issues.',
      'Auto-renewal for 1-year periods; pricing may increase up to 5% annually with 60 days notice.',
      'Yes, 2-year non-solicit of employees and 18-month non-compete in the defined territory.',
      'Informal escalation first; then mediation; then binding arbitration under AAA rules.',
      'GDPR-compliant DPA; data processing addendum; subprocessor list available on request.',
      'Neither party may assign without consent except to an affiliate or acquirer of substantially all assets.',
      'Non-exclusive, worldwide, perpetual license to use the software for internal business purposes.',
      '30-day UAT period; acceptance deemed if no written objection; vendor remediates material defects.',
      'Vendor must maintain $2M general liability and $1M cyber; certificates on request.',
      'Change orders in writing; pricing adjustments per mutually agreed rate card.',
      'Customer may export data for 30 days post-termination; then vendor deletes within 60 days.',
      'Key points: 3-year term, mutual indemnity, liability cap, Delaware law, 99.5% SLA, net 30 payment.',
    ];
    const longChatHistory = [];
    const now = Date.now();
    const msPerMsg = 180000;
    for (let i = 0; i < userPrompts.length; i++) {
      const userTs = new Date(now - (userPrompts.length - i) * msPerMsg).toISOString();
      const asstTs = new Date(new Date(userTs).getTime() + 15000).toISOString();
      const ctxLevel = i % 3 === 0 ? 'visible' : 'full';
      const pageRange = i % 3 === 0 ? { start: 1, end: 5 } : undefined;
      longChatHistory.push(
        { id: `long-u-${i + 1}`, role: 'user', content: userPrompts[i], timestamp: userTs, contextLevel: ctxLevel, pageRange },
        { id: `long-a-${i + 1}`, role: 'assistant', content: assistantReplies[i], timestamp: asstTs, contextLevel: ctxLevel, pageRange, modelId: 'arbor-4o' }
      );
    }
    panel.chatHistory = longChatHistory;

      // Simulate token usage updates
      let used = 12340;
      setInterval(() => {
        panel.tokenUsage = {
          documentTokens: 8200,
          historyTokens: used - 8200 - 640,
          systemTokens: 640,
          totalUsed: used,
          contextLimit: 128000,
          remaining: 128000 - used,
          lastUpdated: new Date().toISOString(),
        };
        used = Math.min(used + 150, 125000);
      }, 2000);

      // Log events
      ['open-change', 'tab-change', 'model-changed', 'settings-changed', 'context-level-changed', 'history-persistence-changed', 'chat-message-sent'].forEach(ev => {
        panel.addEventListener(ev, e => console.log(`[arbor] ${ev}`, e.detail));
      });
    }
    initPanel();
  </script>
</body>
</html>
