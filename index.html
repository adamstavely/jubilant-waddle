<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARBOR AI Assist Panel — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/dist/tokens/tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ai-color-bg-base);
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ai-spacing-xl);
    }
    .demo-content {
      max-width: 600px;
      color: var(--ai-color-text-primary);
      font-size: var(--ai-font-size-base);
      line-height: 1.6;
    }
    .demo-content h1 {
      font-size: var(--ai-font-size-xl);
      margin-bottom: var(--ai-spacing-md);
      color: var(--ai-color-accent-default);
    }
    .trigger-btn {
      margin-top: var(--ai-spacing-lg);
      padding: var(--ai-spacing-sm) var(--ai-spacing-lg);
      background: var(--ai-color-accent-default);
      color: var(--ai-color-accent-on-accent);
      border: none;
      border-radius: var(--ai-radius-md);
      font-size: var(--ai-font-size-base);
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--ai-duration-fast);
    }
    .trigger-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="demo-content">
    <h1>ARBOR Document Review</h1>
    <p>Click the button below to open the AI Assist Panel. The panel slides in from the right with a backdrop. Press Escape or click the backdrop to close.</p>
    <button class="trigger-btn" id="trigger">Open AI Assist Panel</button>
  </div>

  <arbor-ai-assist
    id="panel"
    document-id="demo-doc-001"
    document-name="Sample Contract.pdf"
  ></arbor-ai-assist>

  <script type="module" src="/src/index.ts"></script>
  <script type="module">
    const panel = document.getElementById('panel');
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('click', () => {
      panel.open = true;
    });

    panel.addEventListener('open-change', (e) => {
      panel.open = e.detail.open;
    });

    // Simulate host providing data
    panel.availableModels = [
      { id: 'arbor-4-mini', label: 'ARBOR-4-mini', tier: 'fast', tierLabel: '4m', contextWindowTokens: 32000, available: true },
      { id: 'arbor-4.5-mini', label: 'ARBOR-4.5-mini', tier: 'fast', tierLabel: '4.5m', contextWindowTokens: 32000, available: false },
      { id: 'arbor-4o', label: 'ARBOR-4o', tier: 'balanced', tierLabel: '4o', contextWindowTokens: 128000, available: true, default: true },
      { id: 'arbor-4.5', label: 'ARBOR-4.5', tier: 'balanced', tierLabel: '4.5', contextWindowTokens: 128000, available: true },
      { id: 'arbor-o3', label: 'ARBOR-o3', tier: 'reasoning', tierLabel: 'o3', contextWindowTokens: 200000, available: true },
      { id: 'arbor-o4', label: 'ARBOR-o4', tier: 'reasoning', tierLabel: 'o4', contextWindowTokens: 200000, available: false },
      { id: 'arbor-4.5-turbo', label: 'ARBOR-4.5-turbo', tier: 'extended', tierLabel: 'turbo', contextWindowTokens: 1000000, available: true },
    ];

    panel.storedPrompts = [
      { id: '1', name: 'Privilege Analysis', description: 'Evaluate privilege claims', content: 'Analyze this document for attorney-client privilege.', type: 'message', scope: 'personal', tags: ['legal'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '2', name: 'Obligation Extraction', description: 'List all obligations', content: 'List all contractual obligations by party and deadline.', type: 'message', scope: 'personal', tags: ['contract'], createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
      { id: '3', name: 'Risk Summary', content: 'Summarize key legal risks.', type: 'both', scope: 'team', createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() },
    ];

    // Simulate token usage updates
    let used = 12340;
    setInterval(() => {
      panel.tokenUsage = {
        documentTokens: 8200,
        historyTokens: used - 8200 - 640,
        systemTokens: 640,
        totalUsed: used,
        contextLimit: 128000,
        remaining: 128000 - used,
        lastUpdated: new Date().toISOString(),
      };
      used = Math.min(used + 150, 125000);
    }, 2000);

    // Log events
    ['open-change', 'tab-change', 'model-changed', 'settings-changed', 'context-level-changed', 'history-persistence-changed', 'chat-message-sent'].forEach(ev => {
      panel.addEventListener(ev, e => console.log(`[arbor] ${ev}`, e.detail));
    });
  </script>
</body>
</html>
